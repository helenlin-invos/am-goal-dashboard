name: 自動更新 HubSpot 資料

on:
  schedule:
    # 台灣時間 08:00 = UTC 00:00
    - cron: "0 0 * * *"
    # 台灣時間 14:00 = UTC 06:00
    - cron: "0 6 * * *"
  # 也可手動在 GitHub 頁面按「Run workflow」觸發
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要寫入權限才能 commit data.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch HubSpot data
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: python scripts/fetch_hubspot.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 如果沒有變更就不 commit（避免空 commit）
          git diff --staged --quiet || git commit -m "chore: auto-update HubSpot data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
